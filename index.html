<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Mesh Gesture Demo - High Threshold</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #input_video {
            display: none;
        }
        #output_canvas {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            transform: scaleX(-1);
        }
        .ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 10px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 5px;
            font-size: 0.8em;
        }
        .calibrating { background: #ff9800; }
        .ready { background: #4caf50; }
        
        /* 画面右上に現在の数値を表示（デバッグ用） */
        .debug-info {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #0f0;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <div style="font-size: 1.1em; font-weight: bold; margin-bottom: 5px;">Face Sensor (調整済み)</div>
        <div id="status_text">初期化中...</div>
        <div id="status_badge" class="status-badge calibrating">CALIBRATING</div>
        <div style="margin-top: 10px; font-size: 0.8em; opacity: 0.7;">
            3秒間「真顔」を維持してください
        </div>
    </div>

    <video id="input_video"></video>
    <canvas id="output_canvas"></canvas>

    <script type="module">
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('status_text');
        const statusBadge = document.getElementById('status_badge');

        let isCalibrated = false;
        let calibrationFrames = 0;
        
        //初期登録-------------------------------------------------------
        const CALIBRATION_STEPS = 20; 
        let baseline = { mouthOpen: 0, mouthWidth: 0, eyebrowDist: 0 };

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function drawGlow(ctx, x, y, radius, color) {
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, 2 * Math.PI);
            ctx.fill();
        }

        function onResults(results) {
            if (canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                // ランドマーク（網目）の描画
                drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#FFFFFF20', lineWidth: 1});

                // 鼻の緑丸（常時）
                const nose = landmarks[1];
                canvasCtx.fillStyle = '#00FF00';
                canvasCtx.beginPath();
                canvasCtx.arc(nose.x * canvasElement.width, nose.y * canvasElement.height, 7, 0, 2 * Math.PI);
                canvasCtx.fill();

                // 現在の状態を計算 (鼻〜顎の距離で正規化)
                const faceScale = getDistance(landmarks[1], landmarks[152]);
                const curMouthOpen = getDistance(landmarks[13], landmarks[14]) / faceScale;
                const curMouthWidth = getDistance(landmarks[61], landmarks[291]) / faceScale;
                const curEyebrow = getDistance(landmarks[52], landmarks[159]) / faceScale;

                if (!isCalibrated) {
                    // キャリブレーション中
                    baseline.mouthOpen += curMouthOpen;
                    baseline.mouthWidth += curMouthWidth;
                    baseline.eyebrowDist += curEyebrow;
                    calibrationFrames++;

                    statusText.innerText = `解析中... ${Math.round(calibrationFrames/CALIBRATION_STEPS*100)}%`;

                    if (calibrationFrames >= CALIBRATION_STEPS) {
                        baseline.mouthOpen /= CALIBRATION_STEPS;
                        baseline.mouthWidth /= CALIBRATION_STEPS;
                        baseline.eyebrowDist /= CALIBRATION_STEPS;
                        isCalibrated = true;
                        statusText.innerText = "準備完了";
                        statusBadge.innerText = "READY";
                        statusBadge.className = "status-badge ready";
                    }
                } else {
                    // 判定ロジック

                    // 1. 口を開ける (基準の 2.5倍以上)
                    if (curMouthOpen > baseline.mouthOpen * 2.5) {
                        const x = (landmarks[13].x + landmarks[14].x) / 2 * canvasElement.width;
                        const y = (landmarks[13].y + landmarks[14].y) / 2 * canvasElement.height;
                        drawGlow(canvasCtx, x, y, 150, 'rgba(255, 0, 0, 0.7)');
                    }

                    // 2. 眉を上げる (基準の 1.4倍以上)
                    if (curEyebrow > baseline.eyebrowDist * 1.3) {
                        const lEb = landmarks[52];
                        const rEb = landmarks[282];
                        drawGlow(canvasCtx, lEb.x * canvasElement.width, lEb.y * canvasElement.height, 120, 'rgba(0, 0, 255, 0.7)');
                        drawGlow(canvasCtx, rEb.x * canvasElement.width, rEb.y * canvasElement.height, 120, 'rgba(0, 0, 255, 0.7)');
                    }

                    // 3. 口をすぼめる (基準の 0.85倍以下)
                    // 口を大きく開けている時は除外（重複防止）
                    if (curMouthWidth < baseline.mouthWidth * 0.85) {
                        const x = (landmarks[61].x + landmarks[291].x) / 2 * canvasElement.width;
                        const y = (landmarks[61].y + landmarks[291].y) / 2 * canvasElement.height;
                        drawGlow(canvasCtx, x, y, 150, 'rgba(255, 255, 0, 0.7)');
                    }
                }
            }
            canvasCtx.restore();
        }

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: true,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });
        faceMesh.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await faceMesh.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
